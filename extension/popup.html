<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #232323;
      --border-focus: #d4a024;
      --text: #c8c8c8;
      --text-dim: #6b6b6b;
      --text-muted: #4a4a4a;
      --accent: #d4a024;
      --accent-hover: #e0ad2e;
      --accent-subtle: #d4a02418;
      --danger: #c0392b;
      --success: #27ae60;
      --warning: #d4a024;
      --radius: 4px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12.5px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .container { padding: 14px 16px 16px; }
    h1 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #e8e8e8;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 12px;
      background: var(--accent);
      border-radius: 1px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field { margin-bottom: 10px; }
    .url-current {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 10px;
      word-break: break-all;
      line-height: 1.4;
    }
    .url-slider-container {
      padding: 8px 9px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .url-slider-container.inactive {
      opacity: 0.4;
      pointer-events: none;
    }
    .url-slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
    }
    .url-slider-preview {
      font-size: 11px;
      color: var(--accent);
      font-family: "SF Mono", Menlo, Consolas, monospace;
      word-break: break-all;
      margin-top: 6px;
      line-height: 1.4;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
    }
    .url-alt-options {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .url-alt-option {
      flex: 1;
      padding: 6px 9px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color 0.12s;
      text-align: center;
      font-size: 11px;
      color: var(--text);
    }
    .url-alt-option:hover { border-color: #333; }
    .url-alt-option.selected {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }
    .custom-pattern {
      width: 100%;
      padding: 7px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      margin-top: 4px;
      display: none;
    }
    .custom-pattern:focus { outline: none; border-color: var(--border-focus); }
    .custom-pattern.visible { display: block; }
    textarea {
      width: 100%;
      min-height: 72px;
      padding: 8px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 12.5px;
      resize: vertical;
      line-height: 1.5;
    }
    textarea:focus { outline: none; border-color: var(--border-focus); }
    textarea::placeholder { color: var(--text-muted); }
    button.primary {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s;
      letter-spacing: 0.01em;
    }
    button.primary:hover { background: var(--accent-hover); }
    button.primary:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
    .status {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-dim);
      min-height: 16px;
    }
    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }
    .status.loading { color: var(--warning); }
    .saved-rules {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .saved-rules h2 {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .rule-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 3px;
    }
    .rule-info {
      flex: 1;
      min-width: 0;
    }
    .rule-pattern {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      color: var(--accent);
    }
    .rule-prompt {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rule-actions { display: flex; gap: 2px; }
    .rule-actions button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 5px;
      border-radius: 3px;
      transition: all 0.12s;
    }
    .rule-actions button:hover { color: var(--danger); background: #1e1010; }
    .offline-msg {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 24px 16px;
    }
    .empty-rules {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Page Modifier</h1>

    <div id="offlineView" style="display:none;">
      <div class="offline-msg">Server is not running. Start the server and reopen the extension.</div>
    </div>

    <div id="mainForm">
      <div class="url-current" id="currentUrl">Loading...</div>

      <div class="field">
        <label>Prompt</label>
        <textarea id="prompt" placeholder="e.g. Make the background dark, increase font size, hide the sidebar..."></textarea>
      </div>

      <div class="field">
        <label>URL Pattern</label>
        <div class="url-slider-container" id="sliderContainer">
          <div class="url-slider-labels">
            <span>/</span>
            <span>exact url</span>
          </div>
          <input type="range" id="urlSlider" min="0" max="1" value="1" step="1">
          <div class="url-slider-preview" id="sliderPreview"></div>
        </div>
        <div class="url-alt-options">
          <div class="url-alt-option" id="optPrompt">Describe matching pages</div>
          <div class="url-alt-option" id="optCustom">Enter pattern manually</div>
        </div>
        <input type="text" class="custom-pattern" id="customPattern" placeholder="Custom regex, e.g. https://x\\.com/.*">
        <input type="text" class="custom-pattern" id="promptPattern" placeholder="e.g. GitHub repo pages, YouTube video pages...">
      </div>

      <button class="primary" id="submit">Apply Modification</button>
      <div class="status" id="status"></div>

      <div class="saved-rules">
        <h2>Saved Rules</h2>
        <div id="rulesList"></div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
